services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-open_notebook}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-open_notebook}
      - POSTGRES_DB=${POSTGRES_DB:-open_notebook}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-open_notebook} -d ${POSTGRES_DB:-open_notebook}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    pull_policy: always

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "5055:5055"  # REST API
    environment:
      # REQUIRED: Change this to your own secret string.
      # This encrypts your API keys in the database.
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=change-me-to-a-secret-string
      - OPEN_NOTEBOOK_WARD_TOKEN=${OPEN_NOTEBOOK_WARD_TOKEN:-}
      - OPEN_NOTEBOOK_PASSWORD=${OPEN_NOTEBOOK_PASSWORD:-}

      # Database connection.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-open_notebook}:${POSTGRES_PASSWORD:-open_notebook}@postgres:5432/${POSTGRES_DB:-open_notebook}
      - OPEN_NOTEBOOK_EMBEDDING_DIMENSION=${OPEN_NOTEBOOK_EMBEDDING_DIMENSION:-1536}
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    pull_policy: always
